<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List | TP DevOps UPSE</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
<h1>Mi Lista de Tareas - CI/CD OK</h1>

    <form id="task-form" class="task-form">
      <input type="text" id="task-input" placeholder="Escribe una nueva tarea..." required>
      <button type="submit">Agregar</button>
    </form>

    <div class="filter-wrapper">
      <input type="text" id="filter-input" placeholder="Filtrar tareas...">
    </div>

    <ul id="task-list" class="task-list"></ul>

    <p id="empty-message" class="empty-message" style="display:none;">No hay tareas para mostrar.</p>
  </div>

  <script src="app.js"></script>
</body>
</html>
